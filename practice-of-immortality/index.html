<!doctype html>
<html lang="en">
  <head>
    <!-- @include head.html {"title": "The Practice of Immortality · Dr. Ishan Shivanand", "description": "A USA Today national bestseller, published by Penguin Random House and Hachette."} -->
    <script type="module" src="/src/js/book.js"></script>
  </head>
  <body>
    <!-- @include header.html -->
    <main id="main">
      <!--
        The living tree: the actual golden tree from the book cover
        (isolated and upscaled from the cover art), growing into
        existence on scroll, then breathing on a seamless loop.
        Baseline is the still composite: reduced-motion and no-JS
        visitors see the full tree with no motion. The videos carry
        their own copy of the section gradient, so they composite
        invisibly; modules/bookTree.js runs the grow -> breathe handoff.
      -->
      <section class="book-tree" data-book-tree aria-label="The golden tree from The Practice of Immortality">
        <div class="book-tree__stage">
          <img
            class="book-tree__still"
            src="/assets/img/book/frame-tree.webp"
            alt="A golden tree in full blossom with two white doves, and a figure meditating beneath it — the artwork from the cover of The Practice of Immortality"
            width="1200"
            height="1600"
          />
          <video
            class="book-tree__video book-tree__video--grow"
            data-tree-grow
            src="/assets/video/book/grow-in.mp4"
            muted
            playsinline
            preload="none"
            aria-hidden="true"
          ></video>
          <video
            class="book-tree__video book-tree__video--loop"
            data-tree-loop
            src="/assets/video/book/sway-loop.mp4"
            muted
            playsinline
            loop
            preload="none"
            aria-hidden="true"
          ></video>
        </div>
      </section>
    </main>
    <!-- @include footer.html -->
  </body>
</html>
