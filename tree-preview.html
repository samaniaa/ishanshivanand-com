<!doctype html>
<html lang="en">
<!--
  Standalone review page for the living cover tree.
  Double-click to open: plays the Higgsfield grow-in once, then
  crossfades into the seamless breathe loop — the same sequence
  modules/bookTree.js runs on /practice-of-immortality/.
  References the repo's public assets by relative path; keep it at the
  repo root. Press R to replay.
-->
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>The Living Tree — preview</title>
  <style>
    html, body { margin: 0; height: 100%; }
    body {
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, #e7eefa 0%, #f4f2ec 56%, #fdf3ea 100%);
      font: 12px system-ui;
      color: rgb(23 36 69 / 0.45);
    }
    .stage {
      position: relative;
      aspect-ratio: 3 / 4;
      height: min(92svh, 52rem);
      max-width: 96vw;
    }
    video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      opacity: 0;
      transition: opacity 0.5s linear;
      -webkit-mask-image: linear-gradient(to right, transparent, #000 9%, #000 91%, transparent),
        linear-gradient(to bottom, transparent, #000 9%, #000 91%, transparent);
      -webkit-mask-composite: source-in;
      mask-image: linear-gradient(to right, transparent, #000 9%, #000 91%, transparent),
        linear-gradient(to bottom, transparent, #000 9%, #000 91%, transparent);
      mask-composite: intersect;
    }
    .hint { position: fixed; bottom: 12px; left: 0; right: 0; text-align: center; letter-spacing: 0.08em; }
  </style>
</head>
<body>
  <div class="stage">
    <video id="grow" src="public/assets/video/book/grow-in.mp4" muted playsinline preload="auto"></video>
    <video id="loop" src="public/assets/video/book/sway-loop.mp4" muted playsinline loop preload="auto"></video>
  </div>
  <p class="hint">R — replay the grow-in</p>
  <script>
    const grow = document.getElementById('grow')
    const loop = document.getElementById('loop')

    function start() {
      loop.pause()
      loop.style.opacity = 0
      grow.style.opacity = 0
      grow.currentTime = 0
      grow.play().then(() => { grow.style.opacity = 1 })
    }

    grow.addEventListener('ended', () => {
      loop.currentTime = 0
      loop.play().then(() => {
        loop.style.opacity = 1
        setTimeout(() => { grow.style.opacity = 0 }, 550)
      })
    })

    addEventListener('keydown', (e) => {
      if (e.key.toLowerCase() === 'r') start()
    })
    start()
  </script>
</body>
</html>
