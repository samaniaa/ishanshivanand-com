<h1>Brand · seal &amp; laurel</h1>
<div class="ds-pane" style="display:flex; gap:3rem; align-items:center; flex-wrap:wrap; border:1px solid var(--rule); border-radius:12px">
  <figure style="text-align:center"><img src="<!-- @asset brand/is-seal.svg -->" alt="IS seal" width="84" height="84" /><figcaption style="font-size:0.7rem; color:var(--ink-faint); margin-top:0.5rem"><code>is-seal</code></figcaption></figure>
  <figure style="text-align:center"><img src="<!-- @asset brand/is-seal-scalloped.svg -->" alt="IS scalloped seal" width="84" height="84" /><figcaption style="font-size:0.7rem; color:var(--ink-faint); margin-top:0.5rem"><code>is-seal-scalloped</code></figcaption></figure>
  <figure style="text-align:center"><img src="<!-- @asset brand/is-laurel.svg -->" alt="IS laurel" width="84" height="84" /><figcaption style="font-size:0.7rem; color:var(--ink-faint); margin-top:0.5rem"><code>is-laurel</code></figcaption></figure>
</div>
<p class="ds-note">The seal is a <strong>certificate / brand-mark register</strong> only (favicon, credentials, award contexts) — it is <strong>never placed in a page section</strong>, including the close. Never scattered as watermarks. Seal golds (<code>--c-seal-*</code>) form a separate certificate register.</p>
