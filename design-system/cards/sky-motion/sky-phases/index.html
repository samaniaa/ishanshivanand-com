<h1>Sky &amp; Motion · the seven skies</h1>
<div style="display:grid; gap:0.9rem">
  <div><div style="position:relative;height:96px;border-radius:10px;overflow:hidden;border:1px solid var(--rule-soft)"><div class="day-sky__layer" data-sky="predawn" style="opacity:1"></div><div class="day-sky__stars" style="opacity:1"></div></div><code>predawn</code></div>
  <div><div style="position:relative;height:96px;border-radius:10px;overflow:hidden;border:1px solid var(--rule-soft)"><div class="day-sky__layer" data-sky="sunrise" style="opacity:1"></div></div><code>sunrise</code></div>
  <div><div style="position:relative;height:96px;border-radius:10px;overflow:hidden;border:1px solid var(--rule-soft)"><div class="day-sky__layer" data-sky="morning" style="opacity:1"></div></div><code>morning</code></div>
  <div><div style="position:relative;height:96px;border-radius:10px;overflow:hidden;border:1px solid var(--rule-soft)"><div class="day-sky__layer" data-sky="midday" style="opacity:1"></div></div><code>midday</code></div>
  <div><div style="position:relative;height:96px;border-radius:10px;overflow:hidden;border:1px solid var(--rule-soft)"><div class="day-sky__layer" data-sky="golden" style="opacity:1"></div></div><code>golden</code></div>
  <div><div style="position:relative;height:96px;border-radius:10px;overflow:hidden;border:1px solid var(--rule-soft)"><div class="day-sky__layer" data-sky="dusk" style="opacity:1"></div></div><code>dusk</code></div>
  <div><div style="position:relative;height:96px;border-radius:10px;overflow:hidden;border:1px solid var(--rule-soft)"><div class="day-sky__layer" data-sky="night" style="opacity:1"></div><div class="day-sky__stars" style="opacity:1"></div></div><code>night</code></div>
</div>
<p class="ds-note">One continuous day behind the whole page, scrubbed by scroll. These strips render the REAL <code>.day-sky__layer</code> gradients (predawn → night). Stars breathe only in the dark phases. Ink flips over empty sky, never over text.</p>
